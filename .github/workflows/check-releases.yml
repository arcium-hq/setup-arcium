name: Update Arcium Version

on:
  repository_dispatch:
    types: [new-arcium-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Arcium version to update to (e.g., 0.9.1)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Create version update PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "$DISPATCH_VERSION" ]; then
            VERSION="$DISPATCH_VERSION"
          elif [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            echo "::error::No version provided"
            exit 1
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: '$VERSION'. Must be X.Y.Z"
            exit 1
          fi

          CURRENT=$(awk '/arcium-version:/{found=1} found && /default:/{gsub(/.*default: \047|\047.*/,""); print; exit}' action.yaml)

          if [ "$VERSION" = "$CURRENT" ]; then
            echo "Already at version $VERSION, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
        env:
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_VERSION: ${{ github.event.inputs.version }}

      - name: Check if branch already exists
        if: steps.version.outputs.skip == 'false'
        id: check
        run: |
          BRANCH="v$VERSION"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "Branch $BRANCH already exists, skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Setup Node.js
        if: steps.version.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install yarn
        if: steps.version.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: npm i -g yarn

      - name: Create update PR
        if: steps.version.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "v$VERSION"
          ./scripts/sync-version.sh "$VERSION"

          git add -A
          git commit -m "v$VERSION"
          git push -u origin "v$VERSION"

          gh pr create \
            --title "v$VERSION" \
            --body "$(cat <<EOF
          ## Automated Update

          Triggered by new arcium-tooling release.

          **Version:** $VERSION

          ### Changes
          - Updated \`action.yaml\` default arcium-version
          - Updated \`test_project/package.json\` @arcium-hq/client
          - Updated \`test_project/*/Cargo.toml\` arcium-* crates
          - Regenerated lock files

          ### Checklist
          - [ ] CI passes
          - [ ] Merge to trigger auto-release
          EOF
          )"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
